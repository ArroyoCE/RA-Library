name: retroachievements_library
description: A RetroAchievements library app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^13.2.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utilities
  http: ^1.1.2
  intl: ^0.19.0
  path_provider: ^2.1.5
  file_picker: ^10.1.2
  path: ^1.9.0
  window_manager: ^0.4.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - images/
    - assets/tools/